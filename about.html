<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>Truve | Truve 설명</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div id="top-nav"></div>

      <section class="hero">
        <p class="hero-eyebrow">HOW TRUVE WORKS</p>
        <h2 class="hero-title">기부금은 오프체인으로, 신뢰는 온체인으로</h2>
      </section>

      <section class="page-grid page-grid--two">
        <article class="card">
          <h3 class="section-title">1. 원화 결제 (오프체인)</h3>
          <p class="section-desc">기부자는 익숙한 카드/계좌 방식으로 결제합니다.</p>
        </article>
        <article class="card">
          <h3 class="section-title">2. 기부 증명 기록 (XRPL)</h3>

        </article>
        <article class="card">
          <h3 class="section-title">3. Proof NFT 발행</h3>
          <p class="section-desc">기부 참여를 증명하는 NFT를 발급해 거버넌스 자격으로 연결합니다.</p>
        </article>
        <article class="card">
          <h3 class="section-title">4. 내역 추적 및 거버넌스</h3>
          <p class="section-desc">기부자는 내 상태를 확인하고, 이후 커뮤니티 의사결정에 참여합니다.</p>
        </article>

    <script type="module" src="./src/main/about.ts"></script>
