<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truve | 서비스 소개</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div id="top-nav"></div>

      <header class="page-header">
        <h1>Truve 시스템 소개</h1>
        <p class="subtitle">기부 결제부터 증빙, 커뮤니티 거버넌스까지 한 흐름으로 연결합니다.</p>
      </header>

      <section class="page-grid page-grid--two">
        <article class="card">
          <h3 class="section-title">1. 기부 설계</h3>
          <p class="section-desc">재단 탐색에서 원하는 재단을 담고 비율을 직접 조정해 포트폴리오를 만듭니다.</p>
        </article>
        <article class="card">
          <h3 class="section-title">2. XRPL 기록</h3>
          <p class="section-desc">Xaman으로 서명한 트랜잭션을 XRPL Testnet에 기록해 증빙 가능성을 높입니다.</p>
        </article>
        <article class="card">
          <h3 class="section-title">3. Proof NFT</h3>
          <p class="section-desc">기부 후속 증명을 NFT 형태로 확장할 수 있도록 민팅 구조를 준비해 둡니다.</p>
        </article>
        <article class="card">
          <h3 class="section-title">4. 거버넌스 참여</h3>
          <p class="section-desc">기부자의 참여 이력을 기반으로 재단/커뮤니티 의사결정에 연결합니다.</p>
        </article>
      </section>
    </main>

    <script type="module" src="./src/main/about.ts"></script>
  </body>
</html>
