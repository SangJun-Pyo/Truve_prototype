<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truve | 거버넌스 투표</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div id="top-nav"></div>

      <section class="hero">
        <p class="hero-eyebrow">GOVERNANCE</p>
        <h2 class="hero-title">Proof NFT 보유자 거버넌스 투표</h2>
        <p class="hero-copy">
          NFT 보유자만 참여할 수 있으며, 사용자 티어(Seed/Sprout/Forest)에 따라 가중치가 적용됩니다.
        </p>
      </section>

      <section class="card">
        <div id="governance-eligibility" class="notice"></div>
      </section>

      <section class="card mt-16">
        <h3 class="section-title">이번 라운드 안건</h3>
        <p class="section-desc">다음 분기 커뮤니티 Treasury 우선 지원 재단을 1곳 선택해 주세요.</p>
        <div id="governance-options" class="stack gap-12 mt-12"></div>
      </section>

      <section class="card mt-16">
        <h3 class="section-title">실시간 결과 (목업)</h3>
        <div id="governance-results" class="stack gap-10 mt-12"></div>
      </section>
    </main>

    <script type="module" src="./src/main/governance.ts"></script>
  </body>
</html>
